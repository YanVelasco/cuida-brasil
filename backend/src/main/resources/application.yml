server:
  port: 8080

spring:
  application:
    name: cuidar-brasil-api

  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:cuidar_brasil};encrypt=false;trustServerCertificate=true
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:YourPassword123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-on-validation-error: true

  ai:
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        dimensions: 3072
        distance-type: cosine_distance
    openai:
      api-key: ${GOOGLE_GENAI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-3.1-flash-lite
          temperature: 0.7
          max-tokens: 1024 
      embedding:
        options:
          model: gemini-embedding-001
          dimensions: 1536

security:
  jwt:
    secret: ${JWT_SECRET:cuidar-brasil-jwt-super-secret-key-2024-hackgov-fiap-32chars}
    expiration-ms: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    br.gov.cuidar: DEBUG
    org.springframework.security: INFO