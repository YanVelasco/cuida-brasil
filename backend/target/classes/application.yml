server:
  port: 8080

spring:
  application:
    name: cuidar-brasil-api

  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:cuidar_brasil};encrypt=false;trustServerCertificate=true
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:YourPassword123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-on-validation-error: true

security:
  jwt:
    secret: ${JWT_SECRET:cuidar-brasil-jwt-super-secret-key-2024-hackgov-fiap-32chars}
    expiration-ms: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    br.gov.cuidar: DEBUG
    org.springframework.security: INFO
