  #     - JWT_EXPIRATION=86400000
  #     - FRONTEND_URL=http://localhost:5173,http://localhost:5174
  #     - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=cuidar_brasil;encrypt=false;trustServerCertificate=true;
  #     - SPRING_DATASOURCE_USERNAME=sa
  #     - SPRING_DATASOURCE_PASSWORD=YourPassword123!
  #     - SPRING_FLYWAY_URL=jdbc:sqlserver://sqlserver:1433;databaseName=cuidar_brasil;encrypt=false;trustServerCertificate=true;
  #     - SPRING_FLYWAY_USER=sa
